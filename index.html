<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="記帳本">
<title>記帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E0DDD8;
    --text: #1A1A1A;
    --text2: #666;
    --text3: #999;
    --accent: #2C5F8A;
    --accent-light: #E8F0F8;
    --cc: #7B3FA0;
    --cc-light: #F3EBF9;
    --cash: #1E7A4A;
    --cash-light: #E6F5ED;
    --bank: #C65B0A;
    --bank-light: #FEF0E6;
    --danger: #C0392B;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Header ── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header-date { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .export-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: opacity 0.15s;
  }
  .export-btn:active { opacity: 0.75; }

  /* ── Summary strip ── */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 16px;
  }
  .sum-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 10px 10px 8px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .sum-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .sum-amount { font-size: 16px; font-weight: 700; }
  .sum-cc .sum-amount { color: var(--cc); }
  .sum-cash .sum-amount { color: var(--cash); }
  .sum-bank .sum-amount { color: var(--bank); }

  /* ── Add Entry Form ── */
  .add-form {
    background: var(--surface);
    margin: 0 16px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .form-title {
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    letter-spacing: 0.3px;
  }
  .form-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px; }

  .field-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 5px;
    font-weight: 500;
  }

  .field input[type="text"],
  .field input[type="number"] {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field input:focus { border-color: var(--accent); background: #fff; }

  .pill-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill {
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text2);
    background: var(--bg);
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .pill:active { transform: scale(0.95); }
  .pill.active-cat { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .pill.active-cc { background: var(--cc-light); border-color: var(--cc); color: var(--cc); font-weight: 500; }
  .pill.active-cash { background: var(--cash-light); border-color: var(--cash); color: var(--cash); font-weight: 500; }
  .pill.active-bank { background: var(--bank-light); border-color: var(--bank); color: var(--bank); font-weight: 500; }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 2px;
    transition: opacity 0.15s;
    letter-spacing: 0.5px;
  }
  .submit-btn:active { opacity: 0.75; }

  /* ── List ── */
  .list-section { padding: 0 16px 100px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 10px;
  }
  .section-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-cc { background: var(--cc); }
  .dot-cash { background: var(--cash); }
  .dot-bank { background: var(--bank); }

  .section-title { font-size: 14px; font-weight: 700; }
  .section-total {
    margin-left: auto;
    font-size: 14px;
    font-weight: 700;
  }

  .entry-list { display: flex; flex-direction: column; gap: 8px; }
  .entry-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-cat-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 9px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-食 { background: #FEF3C7; color: #92400E; }
  .badge-衣 { background: #FCE7F3; color: #9D174D; }
  .badge-住 { background: #DBEAFE; color: #1E40AF; }
  .badge-行 { background: #D1FAE5; color: #065F46; }
  .badge-育 { background: #EDE9FE; color: #5B21B6; }
  .badge-樂 { background: #FEE2E2; color: #991B1B; }
  .badge-其他 { background: #F3F4F6; color: #374151; }

  .entry-info { flex: 1; min-width: 0; }
  .entry-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .entry-amount { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .amount-cc { color: var(--cc); }
  .amount-cash { color: var(--cash); }
  .amount-bank { color: var(--bank); }

  .delete-btn {
    width: 28px; height: 28px;
    border: none; background: none;
    color: var(--text3);
    font-size: 18px;
    cursor: pointer;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
    padding: 0;
  }
  .delete-btn:active { background: #FEE2E2; color: var(--danger); transform: scale(0.9); }

  .empty-state {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 20px 0;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1A1A1A;
    color: #fff;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .no-entries { color: var(--text3); font-size: 13px; padding: 8px 0; text-align: center; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <div>
      <div class="app-title">記帳本</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="export-btn" onclick="exportExcel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      匯出 Excel
    </button>
  </div>
</div>

<div class="summary-strip">
  <div class="sum-card sum-cc">
    <div class="sum-label">信用卡</div>
    <div class="sum-amount" id="totalCC">$0</div>
  </div>
  <div class="sum-card sum-cash">
    <div class="sum-label">現金</div>
    <div class="sum-amount" id="totalCash">$0</div>
  </div>
  <div class="sum-card sum-bank">
    <div class="sum-label">銀行扣款</div>
    <div class="sum-amount" id="totalBank">$0</div>
  </div>
</div>

<div class="add-form">
  <div class="form-title">＋ 新增記帳</div>
  <div class="form-body">
    <div class="field">
      <div class="field-label">項目名稱</div>
      <input type="text" id="itemName" placeholder="例：午餐、交通費" autocomplete="off">
    </div>
    <div class="field">
      <div class="field-label">金額（NT$）</div>
      <input type="number" id="itemAmount" placeholder="0" inputmode="numeric" min="0">
    </div>
    <div class="field">
      <div class="field-label">類別</div>
      <div class="pill-group" id="catGroup">
        <div class="pill" data-val="食" onclick="selectCat(this)">食</div>
        <div class="pill" data-val="衣" onclick="selectCat(this)">衣</div>
        <div class="pill" data-val="住" onclick="selectCat(this)">住</div>
        <div class="pill" data-val="行" onclick="selectCat(this)">行</div>
        <div class="pill" data-val="育" onclick="selectCat(this)">育</div>
        <div class="pill" data-val="樂" onclick="selectCat(this)">樂</div>
        <div class="pill" data-val="其他" onclick="selectCat(this)">其他</div>
      </div>
    </div>
    <div class="field">
      <div class="field-label">付款方式</div>
      <div class="pill-group" id="payGroup">
        <div class="pill" data-val="信用卡" onclick="selectPay(this)">信用卡</div>
        <div class="pill" data-val="現金" onclick="selectPay(this)">現金</div>
        <div class="pill" data-val="銀行帳戶扣款" onclick="selectPay(this)">銀行帳戶扣款</div>
      </div>
    </div>
    <button class="submit-btn" onclick="addEntry()">記帳</button>
  </div>
</div>

<div class="list-section">
  <div id="listCC"></div>
  <div id="listCash"></div>
  <div id="listBank"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let entries = JSON.parse(localStorage.getItem('ledger_entries') || '[]');
let selectedCat = '';
let selectedPay = '';

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function fmt(n) {
  return '$' + Number(n).toLocaleString('zh-TW');
}

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

function selectCat(el) {
  document.querySelectorAll('#catGroup .pill').forEach(p => p.classList.remove('active-cat'));
  el.classList.add('active-cat');
  selectedCat = el.dataset.val;
}

function selectPay(el) {
  document.querySelectorAll('#payGroup .pill').forEach(p => {
    p.classList.remove('active-cc','active-cash','active-bank');
  });
  const map = {'信用卡':'active-cc','現金':'active-cash','銀行帳戶扣款':'active-bank'};
  el.classList.add(map[el.dataset.val]);
  selectedPay = el.dataset.val;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function addEntry() {
  const name = document.getElementById('itemName').value.trim();
  const amount = parseFloat(document.getElementById('itemAmount').value);
  if (!name) { showToast('請輸入項目名稱'); return; }
  if (!amount || amount <= 0) { showToast('請輸入正確金額'); return; }
  if (!selectedCat) { showToast('請選擇類別'); return; }
  if (!selectedPay) { showToast('請選擇付款方式'); return; }

  const entry = {
    id: Date.now(),
    name,
    amount,
    cat: selectedCat,
    pay: selectedPay,
    ts: Date.now()
  };
  entries.unshift(entry);
  save();
  render();

  document.getElementById('itemName').value = '';
  document.getElementById('itemAmount').value = '';
  document.querySelectorAll('#catGroup .pill').forEach(p => p.classList.remove('active-cat'));
  document.querySelectorAll('#payGroup .pill').forEach(p => p.classList.remove('active-cc','active-cash','active-bank'));
  selectedCat = ''; selectedPay = '';
  showToast('已記帳 ✓');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function save() {
  localStorage.setItem('ledger_entries', JSON.stringify(entries));
}

function makeEntryHTML(e) {
  const amtClass = {'信用卡':'amount-cc','現金':'amount-cash','銀行帳戶扣款':'amount-bank'}[e.pay];
  return `<div class="entry-item">
    <span class="entry-cat-badge badge-${e.cat}">${e.cat}</span>
    <div class="entry-info">
      <div class="entry-name">${e.name}</div>
      <div class="entry-time">${formatDate(e.ts)}</div>
    </div>
    <div class="entry-amount ${amtClass}">${fmt(e.amount)}</div>
    <button class="delete-btn" onclick="deleteEntry(${e.id})" aria-label="刪除">×</button>
  </div>`;
}

function renderGroup(containerId, label, dotClass, payType, colorVar) {
  const group = entries.filter(e => e.pay === payType);
  const total = group.reduce((s,e) => s+e.amount, 0);
  const container = document.getElementById(containerId);
  if (group.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = `
    <div class="section-header">
      <div class="section-dot ${dotClass}"></div>
      <div class="section-title">${label}</div>
      <div class="section-total" style="color:${colorVar}">${fmt(total)}</div>
    </div>
    <div class="entry-list">${group.map(makeEntryHTML).join('')}</div>`;
}

function render() {
  renderGroup('listCC','信用卡','dot-cc','信用卡','var(--cc)');
  renderGroup('listCash','現金','dot-cash','現金','var(--cash)');
  renderGroup('listBank','銀行帳戶扣款','dot-bank','銀行帳戶扣款','var(--bank)');

  const cc = entries.filter(e=>e.pay==='信用卡').reduce((s,e)=>s+e.amount,0);
  const cash = entries.filter(e=>e.pay==='現金').reduce((s,e)=>s+e.amount,0);
  const bank = entries.filter(e=>e.pay==='銀行帳戶扣款').reduce((s,e)=>s+e.amount,0);
  document.getElementById('totalCC').textContent = fmt(cc);
  document.getElementById('totalCash').textContent = fmt(cash);
  document.getElementById('totalBank').textContent = fmt(bank);
}

function exportExcel() {
  if (entries.length === 0) { showToast('尚無記帳資料'); return; }

  const wb = XLSX.utils.book_new();
  const payTypes = ['信用卡','現金','銀行帳戶扣款'];
  const catOrder = ['食','衣','住','行','育','樂','其他'];

  payTypes.forEach(pay => {
    const group = entries.filter(e => e.pay === pay);
    if (group.length === 0) return;

    const rows = [['項目','類別','金額(NT$)','時間','付款方式']];
    catOrder.forEach(cat => {
      const catEntries = group.filter(e => e.cat === cat);
      catEntries.forEach(e => {
        rows.push([e.name, e.cat, e.amount, formatDate(e.ts), e.pay]);
      });
    });
    const total = group.reduce((s,e) => s+e.amount, 0);
    rows.push(['', '合計', total, '', '']);

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:20},{wch:8},{wch:12},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, pay);
  });

  // 總覽 sheet
  const overview = [['付款方式','類別','金額(NT$)']];
  payTypes.forEach(pay => {
    catOrder.forEach(cat => {
      const total = entries.filter(e => e.pay===pay && e.cat===cat).reduce((s,e)=>s+e.amount,0);
      if (total > 0) overview.push([pay, cat, total]);
    });
  });
  const totalAll = entries.reduce((s,e)=>s+e.amount,0);
  overview.push(['', '總計', totalAll]);
  const wsOv = XLSX.utils.aoa_to_sheet(overview);
  wsOv['!cols'] = [{wch:16},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsOv, '總覽');

  const now = new Date();
  const fname = `記帳_${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast('已匯出 Excel ✓');
}

render();
</script>
</body>
</html>
